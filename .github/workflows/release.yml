name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  BUILD_TARGETS: |
    [
      {"goos":"linux","goarch":"amd64","platform":"linux/amd64"},
      {"goos":"linux","goarch":"arm64","platform":"linux/arm64"}
    ]

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build all executables
        env:
          TARGETS: ${{ env.BUILD_TARGETS }}
        run: |
          go mod download
          mkdir -p dist

          echo "$TARGETS" | jq -c '.[]' | while read -r target; do
            GOOS=$(echo "$target" | jq -r '.goos')
            GOARCH=$(echo "$target" | jq -r '.goarch')

            echo "Building ${GOOS}/${GOARCH}"

            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath -buildvcs=false \
              -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o "dist/app-${GOOS}-${GOARCH}" \
              ./cmd
          done

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push multi-arch image
        env:
          TARGETS: ${{ env.BUILD_TARGETS }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ join(fromJson(env.BUILD_TARGETS).*.platform, ',') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}